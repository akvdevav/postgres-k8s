apiVersion: sql.tanzu.vmware.com/v1
kind: Postgres
metadata:
  name: postgres-sample
  namespace: wp-demo
spec:
  imagePullSecret:
    name: regsecret
  storageClassName: standard
  storageSize: 10G
  
  pgConfig:
    dbname: aruldb
    username: arul

  # Scaled down for local Mac testing
  resources:
    monitor:
      limits:
        cpu: 100m
        memory: 500Mi
      requests:
        cpu: 100m
        memory: 500Mi
    data:
      limits:
        cpu: 250m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 1Gi